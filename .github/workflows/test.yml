name: Test

on:
  push:
    tags:
      - v*.*.*

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: auto
      - name: Install dependencies
        run: uv sync
        working-directory: ./tests/
      - name: Run tests
        run: uv run python -m xmlrunner discover -p "test_*.py" -o ./reports
        env:
          AVATAR_TAG_NAME: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        working-directory: ./tests/
      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v6.4.2
        with:
          report_paths: tests/reports/TEST-*.xml
